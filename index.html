<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥷 RK RAJA COOKIES SERVER</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #ffb6c1; /* गुलाबी बैकग्राउंड */
    color: #000;
    font-family: 'Poppins', sans-serif;
    text-align: center;
}
.container {
    width: 95%;
    max-width: 600px;
    margin: 10px auto;
}
/* Profile Section */
.profile-card {
    margin: 20px auto;
    padding: 15px;
}
.dp-container {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 4px solid #fff;
    overflow: hidden;
    margin: 0 auto 10px;
    box-shadow: 0 0 20px #ff1493;
}
.dp-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.profile-name {
    color: #FFD700;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 2px 2px 4px #000;
    text-decoration: none;
}
.fb-link {
    display: block;
    color: #0000FF;
    font-weight: bold;
    margin-top: 5px;
    text-decoration: none;
    font-size: 14px;
}

.card {
    background: rgba(255, 255, 255, 0.9);
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 25px;
    border: 3px solid #ff1493;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Color Box Labels */
.box-label {
    padding: 12px;
    margin: 8px 0 2px;
    border-radius: 12px;
    font-weight: bold;
    color: #fff;
    border: 2px solid #fff;
}
.label-uid { background: #00bfff; }
.label-speed { background: #32cd32; }
.label-cookies { background: #9370db; }
.label-haters { background: #ffa500; }
.label-last { background: #ff69b4; }
.label-msg { background: #4b0082; }

input, button, select, textarea {
    width: 95%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-top: 5px;
    font-size: 14px;
    box-sizing: border-box;
}

textarea { height: 100px; font-family: monospace; background: #fff; color: #000; }

button { cursor: pointer; font-weight: bold; transition: 0.3s; }
.green { background: linear-gradient(to right, #ff1493, #ff69b4); color: #fff; border: none; font-size: 18px; height: 55px; }
.green:hover { transform: scale(1.02); }

/* Stop Box Stylish */
.stop-card {
    background: #000;
    border: 2px solid #FFD700;
    color: #fff;
}
.red { background: #d60000; color: #fff; border: none; }

#log {
    height: 250px;
    overflow-y: auto;
    background: #1a1a1a;
    color: #0f0;
    border-radius: 12px;
    padding: 15px;
    font-family: monospace;
    font-size: 12px;
    border: 2px solid #ff1493;
    text-align: left;
}
.hidden { display: none; }

.monitor-item { display: flex; justify-content: space-between; padding: 6px 0; font-weight: bold; }
</style>
</head>

<body>
<div class="container">

    <div class="profile-card">
        <div class="dp-container">
            <img src="https://i.ibb.co/Q7Tcg8Mm/IMG-20260405-WA0020.jpg" alt="RK RAJA">
        </div>
        <a href="https://www.facebook.com/Prajapat.9649" class="profile-name">RK RAJA</a>
        <a href="https://www.facebook.com/Prajapat.9649" target="_blank" class="fb-link">OFFICIAL FB ID LINK 🌍</a>
    </div>

    <div class="card">
        <h2 style="color:#ff1493;">𝗥𝗞-𝗣𝗥𝗔𝗝𝗔𝗣𝗔𝗧-𝗖𝗢𝗢𝗞𝗜𝗘-𝗦𝗔𝗥𝗩𝗘𝗥</h2>
        <div class="monitor-item"><span>🕒 Uptime</span><span id="uptimeValue">0h 0m 0s</span></div>
        <div class="monitor-item"><span>🚀 Active Tasks</span><span id="activeTasks">0</span></div>
        <div class="monitor-item"><span>📨 Messages Sent</span><span id="sent">0</span></div>
    </div>

    <div class="card">
        <h2 style="color:#ff1493;">𝐒𝐓𝐀𝐑𝐓 𝐓𝐀𝐒𝐊</h2>

        <div class="box-label label-cookies">🔑 COOKIE INPUT METHOD</div>
        <select id="cookieMethod" onchange="toggleCookieInput()">
            <option value="paste">Paste Cookies</option>
            <option value="file">Upload Cookie File</option>
        </select>

        <div id="fileInputArea" class="hidden">
            <label>Cookie File</label>
            <input type="file" id="cookieFile" accept=".txt">
        </div>

        <div id="pasteInputArea">
            <textarea id="cookieText" placeholder="Paste your cookies here..."></textarea>
        </div>

        <div class="box-label label-msg">📤 MESSAGE FILE (.TXT)</div>
        <input type="file" id="msg" accept=".txt">

        <div class="box-label label-uid">🆔 THREAD ID / GRP UID</div>
        <input type="text" id="thread" placeholder="Target ID...">

        <div class="box-label label-speed">⚡ SPEED (SECONDS)</div>
        <input type="number" id="delay" value="10">

        <div class="box-label label-haters">👤 HATERS NAME</div>
        <input type="text" id="haters" placeholder="Hater name...">

        <div class="box-label label-last">🔚 LAST NAME</div>
        <input type="text" id="last" placeholder="Last name...">

        <button id="startBtn" class="green">🚀 START VIP SERVER</button>
    </div>

    <div class="card stop-card">
        <h2 style="color:#FFD700;">🛑 STOP TASK SYSTEM</h2>
        <input type="text" id="taskIdInput" placeholder="Enter Task ID to Stop" style="background:#222; color:#fff; border:1px solid #FFD700;">
        <button id="stopBtn" class="red">STOP SERVER NOW</button>
    </div>

    <div class="card">
        <h2 style="color:#ff1493;">⌨️ CONSOLE LOG</h2>
        <div id="log">Waiting for action...</div>
    </div>

</div>

<script>
let ws;
const logBox = document.getElementById("log");

function log(msg){
  logBox.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  logBox.scrollTop = logBox.scrollHeight;
}

function toggleCookieInput(){
  const m=document.getElementById("cookieMethod").value;
  document.getElementById("fileInputArea").classList.toggle("hidden",m!=="file");
  document.getElementById("pasteInputArea").classList.toggle("hidden",m!=="paste");
}

function connect(){
  ws = new WebSocket((location.protocol==="https:"?"wss://":"ws://")+location.host+"/ws");
  ws.onopen = () => log("✅ Connected to RK RAJA Server");
  ws.onclose = () => {
    log("⚠️ Connection Lost, reconnecting...");
    setTimeout(connect,3000);
  };
  ws.onmessage = (e)=>{
    let d;
    try{ d=JSON.parse(e.data); }catch{ return; }
    
    // URL Replacement & Log Logic
    if(d.type==="log") {
        let message = d.message;
        if(message.includes("http")) {
            message = "🔄 URL REPLACED: " + message;
        }
        log(message);
    }

    if(d.type==="task_started"){
      log(`🚀 Task Started Successfully!`);
      log(`🆔 TASK ID: ${d.taskId}`);
      log(`🛑 USE THIS ID TO STOP THE BOT`);
      document.getElementById("taskIdInput").value=d.taskId;
    }

    if(d.type==="stopped"){
      log(`⏹ STOPPED | Task ID: ${d.taskId}`);
    }

    if(d.type==="monitor_data"){
      const totalSeconds = d.uptime;
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      document.getElementById("uptimeValue").textContent = `${hours}h ${minutes}m ${seconds}s`;
      document.getElementById("activeTasks").textContent = d.activeTasks;
      document.getElementById("sent").textContent = d.totalSent;
    }
  };
}

setInterval(()=>{ if(ws && ws.readyState===1) ws.send(JSON.stringify({type:"ping"})); },25000);
setInterval(()=>{ if(ws && ws.readyState===1) ws.send(JSON.stringify({type:"monitor"})); },2000);

document.getElementById("startBtn").onclick=()=>{
  const msgFile = document.getElementById("msg").files[0];
  if(!msgFile) return alert("Please select a message file");
  const method = document.getElementById("cookieMethod").value;

  const sendTask = (cookies) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      ws.send(JSON.stringify({
        type: "start",
        cookieContent: cookies,
        messageContent: e.target.result,
        threadID: document.getElementById("thread").value,
        delay: document.getElementById("delay").value,
        hatersName: document.getElementById("haters").value,
        lastHereName: document.getElementById("last").value
      }));
      log("⏳ Request Sent to Server...");
    };
    reader.readAsText(msgFile);
  };

  if(method === "file"){
    const f = document.getElementById("cookieFile").files[0];
    if(!f) return alert("Upload cookie file");
    const r = new FileReader();
    r.onload = e => sendTask(e.target.result);
    r.readAsText(f);
  } else {
    const pText = document.getElementById("cookieText").value;
    if(!pText.trim()) return alert("Paste cookies");
    sendTask(pText);
  }
};

document.getElementById("stopBtn").onclick=()=>{
  const id = document.getElementById("taskIdInput").value;
  if(!id) return alert("Enter Task ID");
  ws.send(JSON.stringify({type:"stop_by_id", taskId:id}));
};

connect();
</script>
</body>
</html>
