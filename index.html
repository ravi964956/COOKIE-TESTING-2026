<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝗠𝗥. 𝗥𝗔𝗩𝗜 𝗞𝗨𝗠𝗔𝗥 𝗣𝗥𝗔𝗝𝗔𝗣𝗔𝗧 𝗖𝗢𝗢𝗞𝗜𝗘 𝗦𝗔𝗥𝗩𝗘𝗥</title>
<style>
    body { background: #ffb6c1; font-family: 'Poppins', sans-serif; text-align: center; margin: 0; padding: 10px; }
    .container { max-width: 600px; margin: auto; }
    .card { background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 25px; border: 3px solid #ff1493; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .dp-container { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #fff; overflow: hidden; margin: 10px auto; box-shadow: 0 0 20px #ff1493; }
    .dp-container img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { color: #FFD700; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px #000; margin-bottom: 5px; display: block; }
    .box-label { padding: 12px; border-radius: 12px; color: #fff; font-weight: bold; margin: 10px 0 5px; border: 2px solid #fff; }
    input, textarea, button { width: 95%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 14px; }
    textarea { height: 100px; font-family: monospace; background: #fff; }
    .green { background: linear-gradient(to right, #ff1493, #ff69b4); color: white; border: none; font-size: 18px; cursor: pointer; font-weight: bold; height: 55px; }
    #log { background: #1a1a1a; color: #0f0; padding: 15px; height: 250px; overflow-y: auto; text-align: left; border-radius: 12px; font-size: 12px; border: 2px solid #ff1493; font-family: monospace; }
    .monitor-box { background: #000; color: #fff; border-radius: 20px; padding: 15px; border: 2px solid #ff1493; }
    .monitor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
</style>
</head>
<body>

<div class="container">
    <div class="profile-card">
        <div class="dp-container"><img src="https://i.postimg.cc/4xqSYF3V/IMG-20260306-225423.png"></div>
        <span class="profile-name">𝗠𝗥. 𝗥𝗔𝗩𝗜 𝗞𝗨𝗠𝗔𝗥 𝗣𝗥𝗔𝗝𝗔𝗣𝗔𝗧</span>
        <span style="font-weight:bold; color:#0000FF; display:block; margin-bottom:15px;">𝗖𝗢𝗢𝗞𝗜𝗘 𝗦𝗔𝗥𝗩𝗘𝗥</span>
    </div>

    <div class="card monitor-box">
        <h3 style="color: #ff1493; margin: 0;">❉═══ RK-PRAJAPAT LIVE ═══❉</h3>
        <div class="monitor-grid">
            <div style="color: #00bfff; font-weight:bold;">🕒 UPTIME <br><span id="uptimeValue">0h 0m 0s</span></div>
            <div style="color: #ffff00; font-weight:bold;">👤 ACTIVE <br><span id="activeTasks">0</span></div>
            <div style="color: #32cd32; font-weight:bold;">✅ SEND <br><span id="sent">0</span></div>
            <div style="color: #ff0000; font-weight:bold;">❌ FAILED <br><span id="failed">0</span></div>
        </div>
        <h3 style="color: #ff1493; margin: 10px 0 0;">❉══════════════════❉</h3>
    </div>

    <div class="card">
        <h2 style="color:#ff1493; margin-top:0;">𝐒𝐓𝐀𝐑𝐓 𝐓𝐀𝐒𝐊</h2>
        <div class="box-label" style="background:#9370db;">🔑 COOKIE PASTE</div>
        <textarea id="cookieText" placeholder="Paste your cookies here..."></textarea>
        <div class="box-label" style="background:#4b0082;">📤 MESSAGE FILE (.TXT)</div>
        <input type="file" id="msg" accept=".txt">
        <div class="box-label" style="background:#00bfff;">🆔 CONVO ID / GRP UID</div>
        <input type="text" id="thread" placeholder="Enter Target ID...">
        <div class="box-label" style="background:#32cd32;">⚡ SPEED (SECONDS)</div>
        <input type="number" id="delay" value="10">
        <div class="box-label" style="background:#ffa500;">👤 HATER NAME</div>
        <input type="text" id="haters" placeholder="Enter name...">
        <button id="startBtn" class="green">🚀 START VIP SERVER</button>
    </div>

    <div class="card" style="background:#000; border: 2px solid #FFD700;">
        <h2 style="color:#FFD700; margin-top:0;">🛑 STOP TASK SYSTEM</h2>
        <input type="text" id="taskIdInput" placeholder="Task ID will appear here..." style="background:#222; color:#fff; border:1px solid #FFD700;">
        <button onclick="stopTask()" style="background:red; color:white; border:none; margin-top:10px; font-weight:bold; cursor:pointer; height:45px;">STOP SERVER NOW</button>
    </div>

    <div class="card">
        <h2 style="color:#ff1493; margin-top:0;">⌨️ CONSOLE LOG</h2>
        <div id="log">Waiting for action...</div>
    </div>
</div>

<script>
    let ws;
    let monitorInterval;

    function connect() {
        const protocol = location.protocol === "https:" ? "wss://" : "ws://";
        ws = new WebSocket(protocol + location.host + "/ws");
        
        ws.onopen = () => {
            log("✅ [Connected] Connection Stable.");
            startMonitoring();
        };

        ws.onclose = () => {
            log("⚠️ [Warning] Connection Lost. Retrying in 2s...");
            stopMonitoring();
            setTimeout(connect, 2000);
        };

        ws.onerror = (err) => {
            console.error("WS Error:", err);
            ws.close();
        };

        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if(d.type === "log") log(d.message);
            if(d.type === "task_started") {
                log(`🚀 SERVER STARTED! ID: ${d.taskId}`);
                document.getElementById("taskIdInput").value = d.taskId;
            }
            if(d.type === "monitor_data") {
                const h = Math.floor(d.uptime / 3600);
                const m = Math.floor((d.uptime % 3600) / 60);
                const s = d.uptime % 60;
                document.getElementById("uptimeValue").innerText = `${h}h ${m}m ${s}s`;
                document.getElementById("activeTasks").innerText = d.activeTasks;
                document.getElementById("sent").innerText = d.totalSent;
                document.getElementById("failed").innerText = d.totalFailed;
            }
        };
    }

    function startMonitoring() {
        if(monitorInterval) clearInterval(monitorInterval);
        monitorInterval = setInterval(() => {
            if(ws && ws.readyState === 1) ws.send(JSON.stringify({type: 'monitor'}));
        }, 2000);
    }

    function stopMonitoring() {
        clearInterval(monitorInterval);
    }

    function log(msg) {
        const l = document.getElementById("log");
        const time = new Date().toLocaleTimeString();
        l.innerHTML += `[${time}] ${msg}<br>`;
        l.scrollTop = l.scrollHeight;
    }

    document.getElementById("startBtn").onclick = () => {
        const file = document.getElementById("msg").files[0];
        if(!file) return alert("Select message file");
        const reader = new FileReader();
        reader.onload = (e) => {
            if(ws && ws.readyState === 1) {
                ws.send(JSON.stringify({
                    type: "start",
                    cookieContent: document.getElementById("cookieText").value,
                    messageContent: e.target.result,
                    threadID: document.getElementById("thread").value,
                    delay: document.getElementById("delay").value,
                    hatersName: document.getElementById("haters").value
                }));
                log("⏳ Sending request...");
            } else {
                alert("Server not connected. Please wait.");
            }
        };
        reader.readAsText(file);
    };

    function stopTask() {
        const id = document.getElementById("taskIdInput").value;
        if(id && ws && ws.readyState === 1) ws.send(JSON.stringify({type: "stop_by_id", taskId: id}));
    }

    connect();
</script>
</body>
</html>
